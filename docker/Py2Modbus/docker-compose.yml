services:
  # 서버용 주피터: modbus_server.ipynb 로 서버 기동 + 값 실시간 변경
  server-lab:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./server:/app
    command: ["bash", "-c", "pip install --no-cache-dir 'pymodbus==3.11.4' jupyterlab && jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --IdentityProvider.token='py'"]
    ports:
      - "15020:8888"  # 서버 주피터: http://localhost:15020
      - "5020:5020"   # Modbus 서버 포트 (호스트에서도 접속 가능)

  # 클라이언트용 주피터: modbus_client.ipynb 로 서버에 접속
  client-lab:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./client:/app
    command: ["bash", "-c", "pip install --no-cache-dir 'pymodbus==3.11.4' jupyterlab && jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --IdentityProvider.token='py'"]
    ports:
      - "8888:8888"   # 클라이언트 주피터: http://localhost:8888
    depends_on:
      - server-lab

